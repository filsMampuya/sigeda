runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 40
  cpu: 1
  memoryMiB: 512

env:
  - variable: SIGEDA_API_URL
    value: https://your-api-url.example.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SIGEDA_API_URL
    value: https://your-api-url.example.com
    availability:
      - BUILD
      - RUNTIME
