services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sigeda
      POSTGRES_USER: sigeda
      POSTGRES_PASSWORD: sigeda
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigeda -d sigeda"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sigeda
      MINIO_ROOT_PASSWORD: sigeda-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/sigeda-realm.json:/opt/keycloak/data/import/sigeda-realm.json:ro

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: CentralBankSearch_2026!Vault
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  api-nest:
    build:
      context: ../..
      dockerfile: apps/api-nest/Dockerfile
    environment:
      PORT: 4100
      DATABASE_URL: postgresql://sigeda:sigeda@postgres:5432/sigeda
      KEYCLOAK_ISSUER: http://localhost:8080/realms/sigeda
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/sigeda/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: sigeda-web
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: sigeda-documents
      MINIO_ACCESS_KEY: sigeda
      MINIO_SECRET_KEY: sigeda-password
      OPENSEARCH_NODE: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
      opensearch:
        condition: service_started
    ports:
      - "4100:4100"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      SIGEDA_API_URL: http://api-nest:4100
      NEXT_PUBLIC_SIGEDA_API_URL: http://localhost:4100
      SIGEDA_ON_PREMISE_API_URL: http://api-nest:4100/api/v1
      NEXT_PUBLIC_SIGEDA_ON_PREMISE_API_URL: http://localhost:4100/api/v1
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: sigeda
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: sigeda-web
    depends_on:
      - api-nest
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-nest
      - web

volumes:
  postgres-data:
  minio-data:
  opensearch-data:
